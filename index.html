<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DoorLoop — Payment Flows & Gap Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #162050;
  --neon: #DFFE02;
  --white: #FFFFFF;
  --text-dim: rgba(219,234,255,0.52);
  --text-mid: rgba(219,234,255,0.78);
  --border: rgba(219,234,255,0.09);
  --border-md: rgba(219,234,255,0.17);
  --green: #4ADE80;
  --amber: #FBBF24;
  --red: #F87171;
  --purple: #C084FC;
  --cyan: #38BDF8;
  --panel-width: 380px;
}
html { scroll-behavior: smooth; }
body {
  background: #0b1220;
  font-family: 'Inter', sans-serif;
  color: var(--white);
  min-height: 100vh;
  display: flex; flex-direction: column;
}

/* ── GLOBAL HEADER ── */
.global-header {
  background: var(--navy);
  border-bottom: 1px solid var(--border);
  padding: 14px 32px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  flex-shrink: 0; z-index: 100; position: sticky; top: 0;
}
.gh-left { display: flex; align-items: center; gap: 16px; }
.gh-logo { font-family:'Poppins',sans-serif; font-weight:800; font-size:18px; color:var(--neon); }
.gh-divider { width:1px; height:28px; background:var(--border-md); }
.gh-title { font-family:'Poppins',sans-serif; font-size:15px; font-weight:700; color:var(--white); }
.gh-sub { font-size:11px; color:var(--text-dim); }
.gh-right { display:flex; align-items:center; gap:12px; }
.gh-badge { font-size:9px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; padding:5px 12px; border-radius:16px; background:rgba(223,254,2,.1); border:1px solid rgba(223,254,2,.25); color:var(--neon); }

/* ── TAB BAR ── */
.tab-bar {
  background: #0f1a2e;
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: flex; align-items: center; gap: 0;
  flex-shrink: 0; position: sticky; top: 52px; z-index: 99;
}
.tab-btn {
  padding: 13px 24px; font-size: 12px; font-weight: 600; color: var(--text-dim);
  border: none; background: none; cursor: pointer;
  border-bottom: 2px solid transparent;
  display: flex; align-items: center; gap: 8px;
  transition: color .2s, border-color .2s; white-space:nowrap;
}
.tab-btn:hover { color: var(--white); }
.tab-btn.active { color: var(--white); border-bottom-color: var(--neon); }
.tab-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.tab-btn.gap .tab-dot { background: var(--red); }
.tab-btn.flows .tab-dot { background: var(--cyan); }
.tab-spacer { flex:1; }
.notes-toggle {
  color: var(--amber) !important;
  border-bottom-color: transparent !important;
}
.notes-toggle.active { border-bottom-color: var(--amber) !important; }

/* ── MAIN LAYOUT ── */
.main-layout { flex: 1; display: flex; overflow: hidden; }
.tab-content { flex: 1; overflow-y: auto; height: calc(100vh - 104px); }
.tab-pane { display: none; height: 100%; }
.tab-pane.active { display: block; }
.tab-pane iframe { width: 100%; height: 100%; border: none; }

/* ── NOTES PANEL ── */
.notes-panel {
  width: 0; overflow: hidden; transition: width .3s ease;
  border-left: 1px solid var(--border);
  background: #0d1628;
  display: flex; flex-direction: column;
  flex-shrink: 0;
}
.notes-panel.open { width: var(--panel-width); }

.np-header {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.np-title { font-family:'Poppins',sans-serif; font-size:13px; font-weight:700; color:var(--white); }
.np-actions { display:flex; gap:8px; }
.np-btn {
  font-size:10px; font-weight:600; padding:5px 10px; border-radius:8px;
  border:1px solid var(--border-md); background:rgba(219,234,255,.05);
  color:var(--text-mid); cursor:pointer; transition:background .15s; text-decoration:none;
}
.np-btn:hover { background:rgba(219,234,255,.1); color:var(--white); }
.np-btn.sheet { border-color:rgba(56,189,248,.3); color:var(--cyan); }
.np-btn.export { border-color:rgba(74,222,128,.3); color:var(--green); }

.np-body { flex:1; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column; gap:10px; }

.note-card {
  background: rgba(219,234,255,.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  position: relative;
}
.nc-section { font-size:9px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--cyan); margin-bottom:4px; }
.nc-feature { font-size:11px; font-weight:600; color:var(--white); margin-bottom:6px; }
.nc-text { font-size:11.5px; color:var(--text-mid); line-height:1.5; white-space:pre-wrap; word-break:break-word; }
.nc-meta { display:flex; align-items:center; justify-content:space-between; margin-top:8px; padding-top:6px; border-top:1px solid var(--border); }
.nc-author { font-size:9.5px; color:var(--text-dim); }
.nc-time { font-size:9px; color:var(--text-dim); }
.nc-delete {
  position:absolute; top:8px; right:10px; width:18px; height:18px;
  border-radius:50%; border:none; background:rgba(248,113,113,.1);
  color:var(--red); font-size:12px; cursor:pointer; display:flex;
  align-items:center; justify-content:center; opacity:0; transition:opacity .15s;
}
.note-card:hover .nc-delete { opacity:1; }

.np-empty {
  text-align:center; padding:40px 20px; color:var(--text-dim); font-size:12px; line-height:1.6;
}

.np-form {
  padding: 12px 14px; border-top: 1px solid var(--border);
  background: rgba(219,234,255,.02);
}
.npf-row { display:flex; gap:8px; margin-bottom:8px; }
.npf-select, .npf-input {
  flex:1; font-size:11px; padding:8px 10px; border-radius:8px;
  border:1px solid var(--border-md); background:rgba(219,234,255,.05);
  color:var(--white); font-family:'Inter',sans-serif; outline:none;
}
.npf-select:focus, .npf-input:focus, .npf-textarea:focus { border-color:rgba(223,254,2,.4); }
.npf-select option { background:#0d1628; }
.npf-textarea {
  width:100%; font-size:11.5px; padding:10px 12px; border-radius:8px;
  border:1px solid var(--border-md); background:rgba(219,234,255,.05);
  color:var(--white); font-family:'Inter',sans-serif; outline:none;
  resize:vertical; min-height:56px; line-height:1.5;
}
.npf-textarea::placeholder { color:var(--text-dim); }
.npf-submit {
  flex:1; padding:9px; border-radius:8px;
  border:none; background:var(--neon); color:#0b1220;
  font-size:11px; font-weight:700; cursor:pointer; letter-spacing:.03em;
  transition:opacity .15s;
}
.npf-submit:hover { opacity:.85; }

/* Toast */
.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
  background:rgba(74,222,128,.15); border:1px solid rgba(74,222,128,.4);
  color:var(--green); padding:10px 20px; border-radius:10px;
  font-size:12px; font-weight:600; z-index:9999;
  transition:transform .3s ease; pointer-events:none;
}
.toast.show { transform:translateX(-50%) translateY(0); }

@media (max-width:900px) {
  :root { --panel-width: 100vw; }
  .notes-panel.open { position:fixed; top:104px; right:0; bottom:0; z-index:200; }
  .global-header { padding:12px 16px; }
  .tab-bar { padding:0 16px; }
}
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="authGate" style="position:fixed;inset:0;z-index:10000;background:#0b1220;display:flex;align-items:center;justify-content:center;">
  <div style="background:#111e35;border:1px solid rgba(219,234,255,.09);border-radius:16px;padding:40px 36px;max-width:380px;width:90%;text-align:center;">
    <div style="font-family:'Poppins',sans-serif;font-weight:800;font-size:20px;color:#DFFE02;margin-bottom:6px;">DoorLoop</div>
    <div style="font-size:13px;color:rgba(219,234,255,.6);margin-bottom:24px;">Payment Flows & Gap Analysis</div>
    <div style="font-size:11px;color:rgba(219,234,255,.4);margin-bottom:12px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;">Enter password to continue</div>
    <input id="authInput" type="password" placeholder="Password" style="width:100%;padding:12px 16px;border-radius:10px;border:1px solid rgba(219,234,255,.17);background:rgba(219,234,255,.05);color:#fff;font-size:14px;font-family:'Inter',sans-serif;outline:none;margin-bottom:12px;" autocomplete="off">
    <button id="authBtn" style="width:100%;padding:12px;border-radius:10px;border:none;background:#DFFE02;color:#0b1220;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.03em;">Access</button>
    <div id="authError" style="margin-top:12px;font-size:11px;color:#F87171;display:none;">Incorrect password</div>
    <div style="margin-top:20px;font-size:10px;color:rgba(219,234,255,.3);">Stripe Confidential</div>
  </div>
</div>

<script>
(function() {
  const AUTH_KEY = 'doorloop_auth_v1';
  const gate = document.getElementById('authGate');

  // Check if already authenticated this session
  if (sessionStorage.getItem(AUTH_KEY) === 'true') {
    gate.style.display = 'none';
    return;
  }

  const input = document.getElementById('authInput');
  const btn = document.getElementById('authBtn');
  const err = document.getElementById('authError');

  async function tryAuth() {
    const pw = input.value;
    if (!pw) return;
    btn.textContent = '...';

    // Try server-side auth first (Vercel deployed)
    const isLocal = window.location.hostname === 'localhost' || window.location.protocol === 'file:';
    if (!isLocal) {
      try {
        const resp = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw })
        });
        const data = await resp.json();
        if (data.authenticated) {
          sessionStorage.setItem(AUTH_KEY, 'true');
          gate.style.display = 'none';
          return;
        }
      } catch (e) {}
    }

    // Fallback: client-side check (for local dev)
    if (pw === 'Tr3@sury!DL-2026x') {
      sessionStorage.setItem(AUTH_KEY, 'true');
      gate.style.display = 'none';
      return;
    }

    err.style.display = 'block';
    btn.textContent = 'Access';
    input.value = '';
    input.focus();
  }

  btn.addEventListener('click', tryAuth);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryAuth(); });
  input.focus();
})();
</script>

<!-- GLOBAL HEADER -->
<header class="global-header">
  <div class="gh-left">
    <span class="gh-logo">DoorLoop</span>
    <div class="gh-divider"></div>
    <div>
      <div class="gh-title">Payment Flows & Gap Analysis</div>
      <div class="gh-sub">Treasury Integration Workstream</div>
    </div>
  </div>
  <div class="gh-right">
    <span class="gh-badge">June 2026</span>
  </div>
</header>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn gap active" data-tab="gap"><span class="tab-dot"></span>Gap Analysis</button>
  <button class="tab-btn flows" data-tab="flows"><span class="tab-dot"></span>Payment Journey Flows</button>
  <div class="tab-spacer"></div>
  <button class="tab-btn notes-toggle" id="notesToggle">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="flex-shrink:0;"><path d="M2 2h12v9H4l-2 2V2zm2 3h8v1H4V5zm0 2.5h5v1H4v-1z"/></svg>
    Team Notes
  </button>
</div>

<!-- MAIN LAYOUT -->
<div class="main-layout">
  <div class="tab-content">
    <div class="tab-pane active" id="pane-gap">
      <iframe src="gap-analysis.html"></iframe>
    </div>
    <div class="tab-pane" id="pane-flows">
      <iframe src="flows.html"></iframe>
    </div>
  </div>

  <div class="notes-panel" id="notesPanel">
    <div class="np-header">
      <div class="np-title">Team Notes</div>
      <div class="np-actions">
        <a class="np-btn sheet" href="https://docs.google.com/spreadsheets/d/1dIlU-35gfFNKu0j0UDUb5Nml_0HmRP5UA7I_CyTd7w8/edit" target="_blank">Shared Sheet</a>
        <button class="np-btn export" onclick="exportNotes()">Copy All</button>
      </div>
    </div>
    <div class="np-body" id="notesList"></div>
    <div class="np-form">
      <div class="npf-row">
        <select class="npf-select" id="noteSection">
          <option value="General">General</option>
          <option value="Contractual Features">Contractual Features</option>
          <option value="Collection & Sweep">Collection & Sweep</option>
          <option value="Wallet Functionality">Wallet Functionality</option>
          <option value="Outbound Payments">Outbound Payments</option>
          <option value="Inbound Transfers">Inbound Transfers</option>
          <option value="Interest & Tax">Interest & Tax</option>
          <option value="Card Issuing">Card Issuing</option>
          <option value="Immediate Actions">Immediate Actions</option>
        </select>
      </div>
      <div class="npf-row">
        <input class="npf-input" id="noteFeature" placeholder="Feature (optional)">
      </div>
      <textarea class="npf-textarea" id="noteText" placeholder="Add a note for the team..."></textarea>
      <div class="npf-row" style="margin-bottom:0; margin-top:8px;">
        <input class="npf-input" id="noteAuthor" placeholder="Your name" style="flex:0 0 110px;">
        <button class="npf-submit" onclick="addNote()">Add Note</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Tab switching
document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn[data-tab]').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('pane-' + btn.dataset.tab).classList.add('active');
  });
});

// Notes panel toggle
const notesToggle = document.getElementById('notesToggle');
const notesPanel = document.getElementById('notesPanel');
notesToggle.addEventListener('click', () => {
  notesPanel.classList.toggle('open');
  notesToggle.classList.toggle('active');
});

// Notes CRUD (localStorage + BroadcastChannel for cross-tab sync)
const STORAGE_KEY = 'doorloop_gap_notes_v2';
let bc;
try { bc = new BroadcastChannel('doorloop_notes_sync'); bc.onmessage = () => renderNotes(); } catch(e) {}

function getNotes() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
}
function saveNotes(notes) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
  if (bc) bc.postMessage('sync');
  renderNotes();
}
function renderNotes() {
  const notes = getNotes();
  const list = document.getElementById('notesList');
  if (!notes.length) {
    list.innerHTML = '<div class="np-empty">No notes yet.<br><br>Add inline notes here or use the <strong>Shared Sheet</strong> for persistent team collaboration.</div>';
    return;
  }
  list.innerHTML = notes.map((n, i) => `
    <div class="note-card">
      <button class="nc-delete" onclick="deleteNote(${i})">&times;</button>
      <div class="nc-section">${esc(n.section)}</div>
      ${n.feature ? `<div class="nc-feature">${esc(n.feature)}</div>` : ''}
      <div class="nc-text">${esc(n.text)}</div>
      <div class="nc-meta">
        <span class="nc-author">${esc(n.author)}</span>
        <span class="nc-time">${esc(n.time)}</span>
      </div>
    </div>`).join('');
}
function addNote() {
  const text = document.getElementById('noteText').value.trim();
  if (!text) return;
  const notes = getNotes();
  notes.unshift({
    section: document.getElementById('noteSection').value,
    feature: document.getElementById('noteFeature').value.trim(),
    text,
    author: document.getElementById('noteAuthor').value.trim() || 'Anonymous',
    time: new Date().toLocaleString('en-US', {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})
  });
  saveNotes(notes);
  document.getElementById('noteText').value = '';
  document.getElementById('noteFeature').value = '';
  showToast('Note added');
}
function deleteNote(i) {
  const notes = getNotes();
  notes.splice(i, 1);
  saveNotes(notes);
  showToast('Note removed');
}
function exportNotes() {
  const notes = getNotes();
  if (!notes.length) { showToast('No notes to export'); return; }
  const txt = notes.map(n => `[${n.section}]${n.feature ? ' ' + n.feature : ''}\n${n.text}\n  — ${n.author}, ${n.time}`).join('\n\n');
  navigator.clipboard.writeText(txt).then(() => showToast('Copied to clipboard'));
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg;
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200);
}

// Remember author name
const ai = document.getElementById('noteAuthor');
ai.value = localStorage.getItem('dl_note_author') || '';
ai.addEventListener('input', () => localStorage.setItem('dl_note_author', ai.value));

renderNotes();
</script>
</body>
</html>
